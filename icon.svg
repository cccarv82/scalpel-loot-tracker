<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd76b"/>
      <stop offset="50%" stop-color="#f0a020"/>
      <stop offset="100%" stop-color="#a86a10"/>
    </linearGradient>
    <linearGradient id="chestBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b4a26"/>
      <stop offset="100%" stop-color="#3d2914"/>
    </linearGradient>
    <linearGradient id="chestLid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a5e30"/>
      <stop offset="100%" stop-color="#5a3a18"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="40" fill="#1a1216"/>
  <!-- treasure pile in back -->
  <circle cx="80" cy="148" r="18" fill="url(#gold)"/>
  <circle cx="178" cy="150" r="20" fill="url(#gold)"/>
  <circle cx="128" cy="138" r="16" fill="url(#gold)"/>
  <!-- chest body -->
  <rect x="44" y="120" width="168" height="92" rx="10" fill="url(#chestBody)" stroke="#1a1009" stroke-width="6"/>
  <!-- chest lid -->
  <path d="M44 124 Q44 64 128 64 Q212 64 212 124 L212 132 L44 132 Z" fill="url(#chestLid)" stroke="#1a1009" stroke-width="6"/>
  <!-- bands -->
  <rect x="44" y="160" width="168" height="10" fill="#1a1009"/>
  <rect x="118" y="120" width="20" height="92" fill="#1a1009"/>
  <!-- lock -->
  <rect x="116" y="142" width="24" height="28" rx="3" fill="url(#gold)" stroke="#1a1009" stroke-width="3"/>
  <circle cx="128" cy="156" r="4" fill="#1a1009"/>
  <!-- coins falling -->
  <circle cx="64" cy="98" r="9" fill="url(#gold)" stroke="#a86a10" stroke-width="2"/>
  <text x="64" y="103" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#5a3a18">$</text>
  <circle cx="200" cy="84" r="11" fill="url(#gold)" stroke="#a86a10" stroke-width="2"/>
  <text x="200" y="90" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#5a3a18">$</text>
  <circle cx="50" cy="50" r="13" fill="url(#gold)" stroke="#a86a10" stroke-width="2"/>
  <text x="50" y="56" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#5a3a18">$</text>
</svg>
